services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: moonlit

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "7331:7331"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/moonlit
      - ATLAS_URI=${ATLAS_URI:-}
      - NODE_ENV=production
      - PORT=7331
      - NEXT_PUBLIC_SOCKET_URL=http://localhost:7331
    depends_on:
      - mongo

volumes:
  mongo_data:
